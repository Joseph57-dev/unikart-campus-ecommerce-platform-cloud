version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing dependencies..."
      - cd src/backend
      - npm install

  build:
    commands:
      - echo "Building application..."
      - cd src/backend
      - npm run build 2>/dev/null || echo "No build script found, skipping build"

  post_build:
    commands:
      - echo "Preparing deployment artifacts..."
      - cd src/backend
      - mkdir -p ../artifacts
      - cp -r . ../artifacts/
      - cd ../artifacts
      - rm -rf node_modules
      - ls -la

artifacts:
  files:
    - '**/*'
  base-directory: artifacts
  discard-paths: no

cache:
  paths:
    - 'src/backend/node_modules/**/*'