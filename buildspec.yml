version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Installing backend dependencies"
      - cd backend
      - npm ci
  build:
    commands:
      - echo "Building backend if build script exists"
      - cd backend
      - npm run build 2>/dev/null || echo "No backend build script found, skipping"
  post_build:
    commands:
      - echo "Packaging deployment artifact"
      - cd $CODEBUILD_SRC_DIR
      - zip -r app.zip backend scripts appspec.yml ecosystem.config.js
artifacts:
  files:
    - app.zip
  discard-paths: yes
cache:
  paths:
    - 'backend/node_modules/**/*'
